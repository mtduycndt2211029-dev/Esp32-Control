<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESP32 Dashboard</title>

<link rel="stylesheet" href="styles.css">
<script type="module" src="app.js" defer></script>

</head>

<body>

<div class="dashboard-card">

<h1>ESP32 GPIO Control</h1>
<div id="statusBadge" class="status-badge offline">Offline</div>

<!-- SENSOR -->
<div class="sensor-container">

<div class="sensor-card">
<div class="sensor-title">Temperature</div>
<div id="tempValue" class="sensor-value">-- °C</div>
</div>

<div class="sensor-card">
<div class="sensor-title">Humidity</div>
<div id="humValue" class="sensor-value">-- %</div>
</div>

</div>

<!-- GPIO1 -->
<div class="gpio-card">

<button id="gpio1Btn" class="gpio-button">GPIO1</button>
<div id="gpio1Status" class="gpio-status">Status: OFF</div>

</div>

<!-- GPIO2 -->
<div class="gpio-card">

<h3>GPIO2 Setup</h3>

<button id="gpio2Btn" class="gpio-button">GPIO2</button>
<div id="gpio2Status" class="gpio-status">Status: OFF</div>

<div class="time-row">

<div class="time-group">
<label>Start Time</label>

<div class="time-select">
<select id="startHour"></select>
<select id="startMin"></select>
</div>

</div>

<div class="time-group">
<label>Stop Time</label>

<div class="time-select">
<select id="stopHour"></select>
<select id="stopMin"></select>
</div>

</div>

</div>

<div class="pwm-box">

<label>PWM Power</label>

<input type="range" id="pwmSlider" min="0" max="255" value="0">

<div id="pwmValue">0</div>

</div>

<!-- APPLY CANCEL -->

<div class="action-buttons">

<button id="applyBtn" class="btn apply-btn">Apply</button>

<button id="cancelBtn" class="btn cancel-btn">Cancel</button>

</div>

<div id="appliedTime" style="display:none;"></div>

<!-- MANUAL -->

<div class="action-buttons manual-row">

<button id="manualOnBtn" class="btn manual-btn">Manual ON</button>

<button id="manualOffBtn" class="btn manual-btn off">Manual OFF</button>

</div>

</div>

<button id="logoutBtn" class="btn logout-btn">Logout</button>

</div>

</body>
</html>

</body>
</html>
